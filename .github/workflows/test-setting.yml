name: test-setting.yml
on:
  pull_request:
    branches:
      - dev
      - main
jobs:
  code-test: # Job
    name: 코드 테스트
    runs-on: ubuntu-latest # Worker Insatance에 OS 설정
    steps:
      - name: 브랜치의 소스코드 체크아웃 실행 # Step 1
        uses: actions/checkout@v6
      - name: 테스트용 JDK 설치 # Step 2
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: gradlew 권한 설정 # Step 3
        run: chmod +x ./gradlew
      - name: 테스트 실행 # Step 4
        run: ./gradlew test --no-daemon